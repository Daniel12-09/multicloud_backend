events { 
    worker_connections 1024; 
}

http {
    # Añadimos el resolver de Google para que Nginx pueda traducir las URLs de Render a IPs reales dinámicamente
    resolver 8.8.8.8 valid=30s;

    server {
        listen 80;
        server_name localhost;

        location / {
            # Definimos las variables con las URLs completas para forzar el re-calculo de IPs
            set $backend1 "https://clouddash-backend-1.onrender.com:443";
            
            proxy_pass $backend1;
            
            # Forzar cabeceras TLS/SSL compatibles con Cloudflare/Render
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            # Cabeceras estándar de proxy inverso
            proxy_set_header Host clouddash-backend-1.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Evitar respuestas cacheadas de error
            proxy_next_upstream error timeout invalid_header http_502;
        }
    }
}