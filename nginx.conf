events { 
    worker_connections 1024; 
}

http {
    # Definición del grupo de servidores backend (Upstream) para la Alta Disponibilidad
    upstream backend_cluster {
        # Algoritmo por defecto: Round Robin (distribuye una petición a cada uno)
        server clouddash-backend-1.onrender.com:443;
        server clouddash-backend-2.onrender.com:443;
    }

    server {
        listen 80;
        server_name localhost;

        # Proxy inverso que recibe el tráfico de los usuarios y lo manda al clúster balanceado
        location / {
            proxy_pass https://backend_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ajustes para manejar correctamente las cabeceras SSL de Render
            proxy_ssl_server_name on;
        }
    }
}